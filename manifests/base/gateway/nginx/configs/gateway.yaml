apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: my-ipv4-gateway
  namespace: nginx-gateway
spec:
  gatewayClassName: nginx
  infrastructure:
    annotations:
      service.beta.kubernetes.io/aws-load-balancer-type: "external"
      service.beta.kubernetes.io/aws-load-balancer-nlb-target-type: "ip"
      service.beta.kubernetes.io/aws-load-balancer-subnets: "subnet-0b088e147a4052daf"
      service.beta.kubernetes.io/aws-load-balancer-scheme: "internet-facing"
  listeners:
  - name: http
    port: 80
    protocol: HTTP
    allowedRoutes:
      namespaces:
        from: All
  - name: https
    port: 443
    protocol: HTTPS
    tls:
      mode: Terminate
      certificateRefs:
        - group: cert-manager.io/v1
          kind: Certificate
          name: imon-work-wildcard-tls
    allowedRoutes:
      namespaces:
        from: All
