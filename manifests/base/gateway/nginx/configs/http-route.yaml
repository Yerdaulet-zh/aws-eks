apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: python
  namespace: nginx-gateway
spec:
  parentRefs:
  - name: my-ipv4-gateway
    namespace: nginx-gateway
    sectionName: http
  # hostnames:
  #   - "*"
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: fastapi-service
      namespace: backend-dev
      port: 80
