apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: fastapi-scaledobject
  namespace: fastapi
spec:
  scaleTargetRef:
    name: fastapi-backend
  pollingInterval: 15
  cooldownPeriod:  30
  minReplicaCount: 1
  maxReplicaCount: 10
  triggers:
  - type: prometheus
    metadata:
      serverAddress: http://kube-prometheus-stack-prometheus.monitoring.svc.cluster.local:9090
      metricName: fastapi_requests_rate
      threshold: '1'
      query: sum(rate(http_requests_total{namespace="fastapi"}[1m]))
