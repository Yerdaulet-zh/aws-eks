apiVersion: v1
kind: Secret
metadata:
  name: redis-acl-secret
  namespace: redis-cluster
type: Opaque
stringData:
  users.acl: |
    user default off -@all
    user operator-admin on >AdminPassword123! +@all
    user backend-api on >ComplexPassword123 ~cache:* +@read +@write -@admin
    user analytics on >SecurePass456 ~reports:* +@read -@write
