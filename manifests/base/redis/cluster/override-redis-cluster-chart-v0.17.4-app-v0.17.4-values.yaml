---
redisCluster:
  name: ""
  # -- Default number of replicas for both leader and follower when not explicitly set
  clusterSize: 3
  clusterVersion: v7
  persistenceEnabled: true
  image: quay.io/opstree/redis
  tag: v7.0.15
  imagePullPolicy: IfNotPresent
  imagePullSecrets: {}
    # - name:  Secret with Registry credentials
  serviceType: ClusterIP
  redisSecret:
    secretName: ""
    secretKey: ""
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 100m
      memory: 128Mi
  minReadySeconds: 0
  # -- Some fields of statefulset are immutable, such as volumeClaimTemplates.
  #    When set to true, the operator will delete the statefulset and recreate it.
  #    Default is false.
  recreateStatefulSetOnUpdateInvalid: false
  # -- MaxMemoryPercentOfLimit is the percentage of redis container memory limit to be used as maxmemory.
  #    Default is 0 (disabled).
  maxMemoryPercentOfLimit: 0
  persistentVolumeClaimRetentionPolicy:
    whenDeleted: Delete
    whenScaled: Retain
  # -- Enable pod anti-affinity between leader and follower pods by adding the appropriate label.
  #    Notice that this requires the operator to have its mutating webhook enabled,
  #    otherwise it will only add an annotation to the RedisCluster CR.
  #    Default is false.
  enableMasterSlaveAntiAffinity: true
  leader:
    # -- Number of Redis leader (master) nodes. If not set, uses clusterSize value
    replicas: 3
    serviceType: ClusterIP

    tolerations:
      - key: "memory-optimized"
        operator: "Equal"
        value: "stateful"
        effect: "NoSchedule"

    securityContext: {}

    topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: DoNotSchedule
        labelSelector:
          matchLabels:
            role: leader
            clusterId: redis-cluster
    pdb:
      enabled: true
      maxUnavailable: 1
      # minAvailable: 1

  follower:
    # -- Number of Redis follower (slave) nodes. If not set, uses clusterSize value
    replicas: 3
    serviceType: ClusterIP

    tolerations:
      - key: "memory-optimized"
        operator: "Equal"
        value: "stateful"
        effect: "NoSchedule"

    securityContext: {}

    topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: DoNotSchedule
        labelSelector:
          matchLabels:
            role: follower
            clusterId: redis-cluster
    pdb:
      enabled: true
      maxUnavailable: 1
      # minAvailable: 1

externalConfig:
  enabled: true
  data: |
    tcp-keepalive 400
    slowlog-max-len 158
    stream-node-max-bytes 2048

serviceMonitor:
  enabled: true
  interval: 30s
  scrapeTimeout: 10s
  # -- Namespace where servicemonitor resource will be created, if empty it will be created in the same namespace as the redis-cluster
  namespace: ""
  # -- extraLabels are added to the servicemonitor when enabled set to true
  extraLabels: {}
    # foo: bar
    # team: devops

redisExporter:
  enabled: true
  image: quay.io/opstree/redis-exporter
  tag: "v1.44.0"
  imagePullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 100m
      memory: 128Mi
  env: []
    # - name: VAR_NAME
    #   value: "value1"
  securityContext: {}

sidecars: []

initContainer:
  enabled: true
  image: ""
  imagePullPolicy: "IfNotPresent"
  resources:
    requests:
      memory: "64Mi"
      cpu: "250m"
    limits:
      memory: "128Mi"
      cpu: "500m"
  env: []
  command: []
  args: []

priorityClassName: ""

storageSpec:
  volumeClaimTemplate:
    spec:
      storageClassName: gp3
      accessModes: ["ReadWriteOnce"]
      resources:
        requests:
          storage: 1Gi
  nodeConfVolume: true
  nodeConfVolumeClaimTemplate:
    spec:
      accessModes: ["ReadWriteOnce"]
      resources:
        requests:
          storage: 1Gi
  #   selector: {}

podSecurityContext:
  runAsUser: 1000
  fsGroup: 1000


# serviceAccountName: redis-cluster-sa

TLS:
  tlsConfig:
    ca: ca.crt
    cert: tls.crt
    key: tls.key
    secret:
      secretName: "redis-tls-cert-secret"

acl:
  # Configure ACL from Kubernetes Secret
  secret:
    secretName: "redis-acl-secret"
  # Configure ACL from PersistentVolumeClaim
  # The PVC must contain a file named "user.acl" at root level
  # persistentVolumeClaim: "redis-acl-pvc"

env: []
  # - name: VAR_NAME
  #   value: "value1"

