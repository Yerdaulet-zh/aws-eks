apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: kube-system

resources:
  # Standard Gateway API
  - https://github.com/kubernetes-sigs/gateway-api/releases/download/v1.1.0/standard-install.yaml

  # AWS Gateway Extensions
  - https://raw.githubusercontent.com/kubernetes-sigs/aws-load-balancer-controller/main/config/crd/gateway/gateway-crds.yaml

helmCharts:
  - name: aws-load-balancer-controller
    releaseName: aws-load-balancer-controller
    repo: https://aws.github.io/eks-charts
    version: 3.2.2
    valuesInline:
      priorityClassName: system-cluster-critical
      installCRDs: true
      enableCertManager: true
      clusterName: "eks-academy-dev"
      vpcId: "vpc-07cd1651bb52b7d36"
      region: "eu-central-1"
      serviceAccount:
        create: true
        name: aws-load-balancer-controller
        annotations:
          # eks.amazonaws.com/role-arn: arn:aws:iam::111122223333:role/AmazonEKSLoadBalancerControllerRole
