apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: argocd

resources:
  - namespace.yaml

  # Non High Available ArgoCD
  # - https://raw.githubusercontent.com/argoproj/argo-cd/stable/manifests/install.yaml

  # High Avaliable ArgoCD
  - https://raw.githubusercontent.com/argoproj/argo-cd/stable/manifests/ha/namespace-install.yaml
  - https://github.com/argoproj/argo-cd/manifests/crds?ref=v2.10.9

patches:
  - target:
      kind: ConfigMap
      name: argocd-cm
    patch: |-
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: argocd-cm
      data:
        kustomize.buildOptions: --enable-helm
  # Global server-side apply for ArgoCD to avoid conflicts with other tools
  - target:
      kind: ConfigMap
      name: argocd-cmd-params-cm
    patch: |-
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: argocd-cmd-params-cm
      data:
        controller.diff.server.side: "true"