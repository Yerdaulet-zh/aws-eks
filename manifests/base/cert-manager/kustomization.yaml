apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: cert-manager

resources:
  - namespace.yaml
  - clusterIssuer.yaml

helmCharts:
  - name: cert-manager
    repo: https://charts.jetstack.io
    version: v1.20.0
    releaseName: cert-manager
    namespace: cert-manager

    includeCRDs: true

    valuesInline:
      config:
        enableGatewayAPI: true
      replicaCount: 2
      global:
        priorityClassName: system-cluster-critical
      crds:
        enabled: true
      webhook:
        replicaCount: 2
        timeoutSeconds: 10
      cainjector:
        replicaCount: 2
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          cpu: 200m
          memory: 256Mi
