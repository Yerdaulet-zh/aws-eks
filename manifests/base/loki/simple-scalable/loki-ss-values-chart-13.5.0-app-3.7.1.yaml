    # -- Enable StatefulSetAutoDeletePVC feature
    enableStatefulSetAutoDeletePVC: true
    whenDeleted: Retain
    whenScaled: Retain
  serviceAccount:
    create: false
    # -- Set this toggle to false to opt out of automounting API credentials for the service account
    automountServiceAccountToken: true


