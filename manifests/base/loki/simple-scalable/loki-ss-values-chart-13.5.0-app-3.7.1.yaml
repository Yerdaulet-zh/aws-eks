# -- Configuration for the index-gateway
indexGateway:
  # -- Enable the component. Requires `loki.deploymentMode` to be set to `Distributed`.
  enabled: false
  # -- Number of replicas for the index-gateway
  replicas: 0
  # -- The name of the PriorityClass for index-gateway pods
  priorityClassName: infrastructure-critical

  # -- Service type for index-gateway service
  # @deprecated -- This option is deprecated in favor of `indexGateway.service.type`
  serviceType: "ClusterIP"
  service:
    # -- Service Type for index-gateway Service
    type: "ClusterIP"
    # -- trafficDistribution for index-gateway Service
    trafficDistribution: "PreferClose"

  # -- Resource requests and limits for the index-gateway
  resources: {}

  # -- Grace period to allow the index-gateway to shutdown before it is killed.
  terminationGracePeriodSeconds: 300
  podDisruptionBudget:
    # -- Enable Pod Disruption Budget
    enabled: true
    # minAvailable: 1
    maxUnavailable: 1
    unhealthyPodEvictionPolicy: IfHealthyBudget
  affinity: {}

  # -- Node selector for ingester pods
  nodeSelector:
    role: stateful

  # -- Topology Spread Constraints for ingester pods
  # The value will be passed through tpl.
  topologySpreadConstraints:
    # --- SPREAD ACROSS ZONES ---
    - maxSkew: 1
      topologyKey: "topology.kubernetes.io/zone"
      whenUnsatisfiable: ScheduleAnyway
      labelSelector:
        matchLabels:
          app.kubernetes.io/component: index-gateway
          app.kubernetes.io/name: '{{ include "loki.name" . }}'
          app.kubernetes.io/instance: '{{ .Release.Name }}'

    # --- SPREAD ACROSS NODES ---
    - maxSkew: 1
      topologyKey: "kubernetes.io/hostname"
      whenUnsatisfiable: ScheduleAnyway
      labelSelector:
        matchLabels:
          app.kubernetes.io/component: index-gateway
          app.kubernetes.io/name: '{{ include "loki.name" . }}'
          app.kubernetes.io/instance: '{{ .Release.Name }}'

  # -- Tolerations for ingester pods
  tolerations:
    - key: "workload"
      operator: "Equal"
      value: "stateful"
      effect: "NoSchedule"
  persistence:
    # -- Enable creating PVCs which is required when using boltdb-shipper
    enabled: true
    # -- Set access modes on the PersistentVolumeClaim
    accessModes:
      - ReadWriteOnce
    # -- Parameters used for the `data` volume when volumeClaimEnabled if false
    dataVolumeParameters:
      emptyDir: {}
    # -- Size of persistent disk
    size: 10Gi
    # -- Storage class to be used.
    # If defined, storageClassName: <storageClass>.
    # If set to "-", storageClassName: "", which disables dynamic provisioning.
    # If empty or set to null, no storageClassName spec is
    # set, choosing the default provisioner (gp2 on AWS, standard on GKE, AWS, and OpenStack).
    storageClass: gp3
    # -- Enable StatefulSetAutoDeletePVC feature
    enableStatefulSetAutoDeletePVC: true
    whenDeleted: Retain
    whenScaled: Retain

  # -- trafficDistribution for index-gateway service
  trafficDistribution: "PreferClose"

