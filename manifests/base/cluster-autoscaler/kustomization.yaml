apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: kube-system

helmCharts:
  - name: cluster-autoscaler
    repo: https://kubernetes.github.io/autoscaler
    version: 9.56.0
    releaseName: cluster-autoscaler
    namespace: kube-system

    # Use valuesInline instead of a separate values.yaml file
    valuesInline:
      autoDiscovery:
        clusterName: "eks-academy-dev"

      awsRegion: "eu-central-1"
      cloudProvider: aws

      rbac:
        create: true
        serviceAccount:
          create: true
          name: cluster-autoscaler
          # Leave annotations empty because of Pod Identity
          annotations: {}

      replicaCount: 1

      extraArgs:
        v: 4
        stderrthreshold: info
        logtostderr: true
        skip-nodes-with-local-storage: false
        scan-interval: 10s
        expander: least-waste
        balance-similar-node-groups: true

      resources:
        limits:
          cpu: 100m
          memory: 200Mi
        requests:
          cpu: 100m
          memory: 200Mi
